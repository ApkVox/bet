name: Daily NBA Predictions

on:
  schedule:
    - cron: "0 8 * * *" # 08:00 UTC = 03:00 AM Colombia
    - cron: "0 15 * * *" # 15:00 UTC = 10:00 AM Colombia (backup)
  workflow_dispatch:

concurrency:
  group: predictions-job
  cancel-in-progress: false

jobs:
  generate-predictions:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      # ─────────────────────────────────────────────
      # 1. Checkout siempre con el estado más reciente
      # ─────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false
          lfs: false
          fetch-depth: 0
          ref: main

      # ─────────────────────────────────────────────
      # 2. Python + dependencias
      # ─────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─────────────────────────────────────────────
      # 3. Limpiar archivos temporales
      # ─────────────────────────────────────────────
      - name: Clean stale files
        run: |
          rm -rf *.model __pycache__ || true

      # ─────────────────────────────────────────────
      # 4. Ejecutar el motor de predicciones
      # ─────────────────────────────────────────────
      - name: Run Predictions Engine
        env:
          DEEPSEEK_API_KEY: "${{ secrets.DEEPSEEK_API_KEY }}"
          ODDS_API_KEY: "${{ secrets.ODDS_API_KEY }}"
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_KEY: "${{ secrets.SUPABASE_KEY }}"
        run: |
          python generate_daily_job.py
          echo "ENGINE_STATUS=$?" >> "$GITHUB_ENV"

      # ─────────────────────────────────────────────
      # 5. La BD se gestiona vía Supabase, ya no
      #    hay necesidad de hacer commit a history.db
      # ─────────────────────────────────────────────
      - name: Complete
        run: echo "Predicciones completadas y guardadas en Supabase."
